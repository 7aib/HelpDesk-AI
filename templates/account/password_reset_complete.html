{% extends "base.html" %}

{% block title %}Password Reset Complete - {{ app_name }}{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="brand-logo text-primary mb-2">
                        <i class="bi bi-headset"></i> {{ app_name }}
                    </div>
                </div>

                <div class="text-center">
                    <div class="mb-4">
                        <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                    </div>
                    <h4 class="mb-3">Password Reset Complete</h4>
                    <p class="text-muted mb-4">
                        Your password has been successfully reset.
                        You can now sign in with your new password.
                    </p>
                    <a href="{% url 'account_login' %}" class="btn btn-primary px-4">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
